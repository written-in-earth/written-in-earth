<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Written in Earth</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Space+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#080c14;--panel:#111927;--card:#141d2b;
  --b:rgba(120,180,255,0.1);--bhi:rgba(120,180,255,0.22);
  --gold:#c9a84c;--goldl:#e8c97a;
  --text:#d4e3f5;--dim:rgba(212,227,245,0.42);--mut:rgba(212,227,245,0.2);
  --gg:0 0 28px rgba(201,168,76,0.18);--r:4px;
}
body{background:var(--ink);color:var(--text);font-family:'DM Sans',sans-serif;}
.app{min-height:100vh;background:var(--ink);background-image:radial-gradient(ellipse 100% 50% at 50% -5%,rgba(20,50,100,0.28) 0%,transparent 65%);}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;border-bottom:1px solid var(--b);}
.brand{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:.04em;}
.brand span{color:var(--text);font-weight:400;}
.hero{text-align:center;padding:60px 24px 0;position:relative;}
.hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:1px;height:50px;background:linear-gradient(to bottom,transparent,var(--gold));opacity:.35;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-bottom:22px;padding:7px 16px;border:1px solid rgba(201,168,76,.2);border-radius:2px;background:rgba(201,168,76,.04);}
.edot{width:5px;height:5px;background:var(--gold);border-radius:50%;animation:blink 2.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.htitle{font-family:'Playfair Display',serif;font-size:clamp(48px,9vw,100px);font-weight:900;line-height:.9;color:#fff;letter-spacing:-.02em;}
.htitle .g{color:var(--gold);}
.htitle .it{font-style:italic;font-weight:400;}
.hrule{width:72px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:24px auto;opacity:.45;}
.gift-section{margin:0 auto;max-width:680px;padding:24px 32px;text-align:center;border-top:1px solid rgba(201,168,76,.15);border-bottom:1px solid rgba(201,168,76,.15);}
.gift-title{font-family:'Playfair Display',serif;font-size:26px;font-style:italic;color:#fff;margin-bottom:10px;}
.gift-desc{font-size:13px;color:var(--dim);letter-spacing:.04em;margin-bottom:16px;line-height:1.8;}
.gift-occasions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.gift-occasions span{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);border-radius:20px;padding:6px 16px;font-family:'Space Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;}

.sl{font-family:'Space Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.sl::after{content:'';flex:1;height:1px;background:var(--b);}
.isec{max-width:640px;margin:0 auto;padding:0 24px 40px;}
.iwrap{position:relative;}
.ninput{width:100%;background:var(--panel);border:1px solid var(--bhi);border-radius:var(--r);padding:18px 72px 18px 22px;font-family:'Playfair Display',serif;font-size:28px;font-weight:700;letter-spacing:.18em;color:#fff;outline:none;transition:border-color .2s,box-shadow .2s;text-transform:uppercase;}
.ninput::placeholder{color:var(--mut);font-weight:400;font-style:italic;font-size:20px;letter-spacing:.05em;}
.ninput:focus{border-color:rgba(201,168,76,.4);box-shadow:0 0 0 3px rgba(201,168,76,.06),var(--gg);}
.cc{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-family:'Space Mono',monospace;font-size:10px;color:var(--mut);}
.ihint{margin-top:10px;font-size:11px;color:var(--mut);text-align:center;letter-spacing:.05em;font-family:'Space Mono',monospace;}
.psec{max-width:1100px;margin:0 auto;padding:0 24px 40px;}
.lgrid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.lcard{position:relative;width:88px;aspect-ratio:2/3;border-radius:var(--r);overflow:hidden;cursor:pointer;border:1px solid var(--b);transition:transform .2s,border-color .2s,box-shadow .2s;background:var(--card);flex-shrink:0;}
.lcard:hover{transform:translateY(-6px) scale(1.04);border-color:var(--gold);box-shadow:0 16px 40px rgba(0,0,0,.5),var(--gg);z-index:2;}
.lcard img{width:100%;height:100%;object-fit:cover;display:block;}
.ftile{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:40px;font-weight:900;color:rgba(255,255,255,.08);}
.cov{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,12,20,.92) 0%,rgba(8,12,20,.08) 52%,transparent 100%);pointer-events:none;}
.clet{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.9);}
.cbadge{position:absolute;top:6px;right:6px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:2px;font-family:'Space Mono',monospace;font-size:7px;color:var(--gold);padding:2px 4px;}
.ctap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(201,168,76,.1);opacity:0;transition:opacity .15s;font-family:'Space Mono',monospace;font-size:8px;color:var(--gold);letter-spacing:.1em;pointer-events:none;}
.lcard:hover .ctap{opacity:1;}
.lcard.solo:hover .ctap{opacity:0;}
.vback{position:fixed;inset:0;background:rgba(8,12,20,.8);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;}
.vpop{background:var(--panel);border:1px solid var(--bhi);border-radius:8px;padding:28px;max-width:520px;width:100%;box-shadow:0 32px 80px rgba(0,0,0,.7);}
.vph{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.vpt{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff;}
.vpt span{color:var(--gold);font-style:italic;}
.vpc{background:none;border:1px solid var(--bhi);border-radius:var(--r);color:var(--dim);font-size:16px;cursor:pointer;padding:4px 10px;}
.vpc:hover{border-color:var(--gold);color:var(--gold);}
.vpg{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;}
.vptile{position:relative;aspect-ratio:2/3;border-radius:var(--r);overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s;}
.vptile:hover{transform:scale(1.04);}
.vptile.sel{border-color:var(--gold);box-shadow:var(--gg);}
.vptile img{width:100%;height:100%;object-fit:cover;}
.vtlbl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(8,12,20,.95) 0%,transparent 100%);padding:18px 6px 6px;font-family:'Space Mono',monospace;font-size:7px;color:var(--dim);text-align:center;line-height:1.4;}
.vcheck{position:absolute;top:6px;right:6px;background:var(--gold);color:var(--ink);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.vhint{margin-top:14px;font-family:'Space Mono',monospace;font-size:9px;color:var(--mut);text-align:center;letter-spacing:.08em;}
.prevsec{max-width:1100px;margin:0 auto;padding:0 24px 40px;}
.mockup-scene{width:100%;background:linear-gradient(135deg,#1a1f2e 0%,#141820 50%,#0f1318 100%);border-radius:6px;padding:48px 24px 56px;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;}
.mockup-scene::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.005) 0,rgba(255,255,255,.005) 1px,transparent 1px,transparent 60px),repeating-linear-gradient(0deg,rgba(255,255,255,.005) 0,rgba(255,255,255,.005) 1px,transparent 1px,transparent 60px);}
.canvas-wrap{position:relative;z-index:2;box-shadow:0 30px 80px rgba(0,0,0,.8),0 4px 12px rgba(0,0,0,.5);}
.canvas-border{position:absolute;inset:0;border:12px solid #1e140a;z-index:3;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(201,168,76,.12),inset 3px 3px 10px rgba(0,0,0,.5),0 0 0 1px rgba(0,0,0,.8);}
.canvas-content{display:flex;width:100%;height:100%;}
.canvas-tile{flex:1;height:100%;overflow:hidden;position:relative;cursor:pointer;}
.canvas-tile img{width:100%;height:100%;object-fit:cover;display:block;}
.canvas-tile:hover{opacity:.9;}
.canvas-div{width:1px;background:rgba(0,0,0,.5);flex-shrink:0;}
.canvas-lbl{position:absolute;bottom:-32px;left:0;right:0;text-align:center;font-family:'Space Mono',monospace;font-size:9px;color:rgba(201,168,76,.6);letter-spacing:.12em;}
.mockup-empty{font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:var(--mut);text-align:center;position:relative;z-index:2;padding:40px;}
.locbar{margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.lchip{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.11);border-radius:2px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:8px;color:var(--dim);letter-spacing:.05em;}
.lchip strong{color:var(--gold);margin-right:5px;font-size:9px;}
.osec{max-width:880px;margin:0 auto;padding:0 24px 60px;}
.ptabs{display:flex;background:var(--panel);border:1px solid var(--b);border-radius:var(--r) var(--r) 0 0;border-bottom:none;overflow:hidden;}
.ptab{flex:1;padding:14px 8px;text-align:center;cursor:pointer;transition:background .18s;border-right:1px solid var(--b);position:relative;}
.ptab:last-child{border-right:none;}
.ptab:hover{background:rgba(201,168,76,.04);}
.ptab.act{background:rgba(201,168,76,.07);}
.ptab.act::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold);}
.tname{font-family:'Playfair Display',serif;font-size:12px;font-weight:700;color:#fff;margin-bottom:2px;}
.tdesc{font-size:9px;color:var(--dim);letter-spacing:.03em;}
.spanel{background:var(--panel);border:1px solid var(--b);border-radius:0 0 var(--r) var(--r);padding:20px;margin-bottom:14px;}
.digital-panel{background:var(--panel);border:1px solid var(--b);border-radius:0 0 var(--r) var(--r);padding:28px;margin-bottom:14px;text-align:center;}
.digital-price{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--goldl);}
.digital-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);margin-top:8px;letter-spacing:.12em;}
.digital-note{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.15);border-radius:var(--r);padding:14px 18px;margin-bottom:14px;font-family:'Space Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:.06em;text-align:center;line-height:1.8;}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:600px){.sgrid{grid-template-columns:repeat(2,1fr);}}
.scard{padding:14px 10px;border:1.5px solid var(--b);border-radius:var(--r);cursor:pointer;text-align:center;transition:border-color .18s,background .18s;}
.scard:hover{border-color:rgba(201,168,76,.3);}
.scard.sel{border-color:var(--gold);background:rgba(201,168,76,.06);box-shadow:var(--gg);}
.slbl{font-family:'Space Mono',monospace;font-size:11px;color:#fff;margin-bottom:3px;letter-spacing:.05em;}
.ssub{font-family:'Space Mono',monospace;font-size:9px;color:var(--gold);margin-bottom:5px;letter-spacing:.05em;}
.sprice{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--goldl);}
.loc-toggle{display:flex;align-items:flex-start;gap:14px;background:var(--panel);border:1px solid var(--b);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;cursor:pointer;transition:border-color .2s;}
.loc-toggle:hover{border-color:rgba(201,168,76,.3);}
.ttrack{width:40px;height:22px;border-radius:11px;background:rgba(120,180,255,.15);border:1px solid var(--b);position:relative;transition:background .2s;flex-shrink:0;margin-top:2px;}
.ttrack.on{background:var(--gold);border-color:var(--gold);}
.tthumb{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s;}
.ttrack.on .tthumb{transform:translateX(18px);}
.ttext{flex:1;}
.ttitle{display:block;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;}
.tdescr{display:block;font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.05em;line-height:1.6;}
.ctabtn{width:100%;padding:18px;background:var(--gold);color:var(--ink);border:none;border-radius:var(--r);font-family:'Playfair Display',serif;font-size:16px;font-weight:700;letter-spacing:.07em;cursor:pointer;transition:background .2s,transform .15s,box-shadow .2s;}
.ctabtn:hover{background:var(--goldl);transform:translateY(-2px);box-shadow:0 10px 28px rgba(201,168,76,.28);}
.ctabtn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none;}
.csub{text-align:center;margin-top:12px;font-family:'Space Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;}
.copy-summary{background:#111927;border:1px solid rgba(201,168,76,.2);border-radius:6px;padding:18px;margin:0 24px 16px;max-width:880px;margin-left:auto;margin-right:auto;}
.copy-summary-title{font-family:'Space Mono',monospace;font-size:9px;color:#c9a84c;letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;}
.copy-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(120,180,255,.08);}
.copy-row:last-child{border-bottom:none;}
.copy-ltr{font-size:14px;font-weight:700;color:#c9a84c;width:22px;font-family:'Playfair Display',serif;}
.copy-loc{font-size:12px;color:rgba(212,227,245,.6);flex:1;padding:0 12px;}
.copy-product{font-size:10px;color:rgba(212,227,245,.4);margin-top:10px;padding-top:10px;border-top:1px solid rgba(120,180,255,.08);font-family:'Space Mono',monospace;letter-spacing:.06em;}
.copy-btn{width:100%;padding:15px;background:#c9a84c;color:#080c14;border:none;border-radius:4px;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:background .2s;margin-top:14px;}
.copy-btn:hover{background:#e8c97a;}
.copy-btn.copied{background:#1a3a5c;color:#c9a84c;}
.copy-hint{text-align:center;font-size:10px;color:rgba(212,227,245,.3);margin-top:8px;font-family:'Space Mono',monospace;letter-spacing:.06em;padding:0 24px;}
.foot{border-top:1px solid var(--b);padding:32px 24px;text-align:center;max-width:680px;margin:0 auto;}
.fbrand{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold);font-style:italic;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--gold);color:var(--ink);padding:12px 28px;border-radius:var(--r);font-family:'Playfair Display',serif;font-size:14px;font-weight:700;z-index:200;transition:transform .32s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .5s ease both;}
.fu1{animation-delay:.06s}.fu2{animation-delay:.13s}.fu3{animation-delay:.19s}.fu4{animation-delay:.25s}
</style>

  V:[{u:CDN+"/V/v-0-CellinaandMedunaRivers-Italy.png",l:"Cellina and Meduna Rivers, Italy"},{u:CDN+"/V/v-1-NewSouthWales-Australia.png",l:"New South Wales, Australia"},{u:CDN+"/V/v-2-PadmaRiver-Bangladesh.png",l:"Padma River, Bangladesh"},{u:CDN+"/V/v-3-Mapleton-Maine.png",l:"Mapleton, Maine"}],
  W:[{u:CDN+"/W/w-0-PonoyRiver-Russia.png",l:"Ponoy River, Russia"},{u:CDN+"/W/w-1-LaPrimavera-Columbia.png",l:"La Primavera, Colombia"}],
  X:[{u:CDN+"/X/x-0-WolstenholmeFjord-Greenland.png",l:"Wolstenholme Fjord, Greenland"},{u:CDN+"/X/x-1-DavisStrait-Greenland.png",l:"Davis Strait, Greenland"},{u:CDN+"/X/x-2-SermersooqMunicipality-Greenland.png",l:"Sermersooq, Greenland"}],
  Y:[{u:CDN+"/Y/y-0-BíobíoRiver-Chile.png",l:"Biobio River, Chile"},{u:CDN+"/Y/y-1-EstuariodeVirrila-Peru.png",l:"Estuario de Virrila, Peru"},{u:CDN+"/Y/y-2-tasmanGlacier-newZealand.png",l:"Tasman Glacier, New Zealand"}],
  Z:[{u:CDN+"/Z/z-0-PrimaveradoLeste-Brazil.png",l:"Primavera do Leste, Brazil"},{u:CDN+"/Z/z-1-MohammedBoudiaf-Algeria.png",l:"Mohammed Boudiaf, Algeria"}]
};

var COLORS = {A:"#1a3a5c",B:"#2d1b4e",C:"#0d3d2e",D:"#3d1a0d",E:"#1a2d3d",F:"#2d3d1a",G:"#3d2d0d",H:"#0d1a3d",I:"#3d0d2d",J:"#1a3d2d",K:"#2d0d3d",L:"#3d1a2d",M:"#0d3d1a",N:"#1a0d3d",O:"#3d2d1a",P:"#0d2d3d",Q:"#2d3d0d",R:"#3d0d1a",S:"#1a3d0d",T:"#0d1a2d",U:"#3d1a0d",V:"#2d0d1a",W:"#1a2d0d",X:"#0d3d2d",Y:"#3d0d2d",Z:"#1a0d2d"};

var PRODUCTS = [
  {id:"digital", name:"Digital Download", desc:"Instant download", sizes:[{id:"d1",label:"Digital Download",sub:"Any size",price:"$14.99"}]},
  {id:"print",   name:"Fine Art Print",   desc:"Museum-grade paper", sizes:[{id:"p1",label:"8x16 in",sub:"Starter",price:"$35"},{id:"p2",label:"10x20 in",sub:"Entry",price:"$45"},{id:"p3",label:"16x32 in",sub:"Most Popular",price:"$75"},{id:"p4",label:"20x40 in",sub:"Premium",price:"$99"}]},
  {id:"canvas",  name:"Canvas Print",     desc:"Gallery-wrapped", sizes:[{id:"c1",label:"12x24 in",sub:"Entry",price:"$95"},{id:"c2",label:"16x32 in",sub:"Most Popular",price:"$149"},{id:"c3",label:"24x48 in",sub:"Premium",price:"$219"}]}
];

var SHOWCASE = ["E","A","R","T","H"];
var state = {text:"", pos:{}, productId:"digital", sizeId:"d1", showLocs:true, popup:null};

function letters() {
  return state.text.replace(/[^A-Z]/g,"").split("").filter(function(c){return c.length > 0;});
}
function getProduct() {
  for(var i=0;i<PRODUCTS.length;i++){if(PRODUCTS[i].id===state.productId)return PRODUCTS[i];}
  return PRODUCTS[0];
}
function getSize() {
  var p = getProduct();
  for(var i=0;i<p.sizes.length;i++){if(p.sizes[i].id===state.sizeId)return p.sizes[i];}
  return p.sizes[0];
}
function getImg(letter, pos) {
  var v = LD[letter];
  if(!v) return null;
  var idx = state.pos[letter+"_"+pos] || 0;
  return v[Math.min(idx, v.length-1)];
}
function fb(l) {
  return '<div class="ftile" style="background:linear-gradient(135deg,'+COLORS[l]+',#080c14)">'+l+'</div>';
}


function renderPicker() {
  var ltrs = letters();
  var el = document.getElementById("picker-sec");
  if(ltrs.length === 0){el.innerHTML="";return;}
  var h = '<div class="psec fu fu2"><div class="sl">02 &middot; Choose your satellite images</div><div class="lgrid">';
  for(var i=0;i<ltrs.length;i++) {
    var l = ltrs[i];
    var v = LD[l] || [];
    var idx = state.pos[l+"_"+i] || 0;
    var img = v[Math.min(idx,v.length-1)];
    var multi = v.length > 1;
    h += '<div class="lcard'+(multi?'':' solo')+'" onclick="op('+i+')">';
    h += img ? '<img src="'+img.u+'" alt="'+l+'" loading="lazy">' : fb(l);
    h += '<div class="cov"></div><div class="clet">'+l+'</div>';
    if(multi){h += '<div class="cbadge">'+(idx+1)+'/'+v.length+'</div><div class="ctap">PICK</div>';}
    h += '</div>';
  }
  h += '</div></div>';
  el.innerHTML = h;
}

function renderPopup() {
  var el = document.getElementById("popup-sec");
  if(state.popup === null){el.innerHTML="";return;}
  var pp = state.popup;
  var ltrs = letters();
  var pl = ltrs[pp];
  if(!pl){el.innerHTML="";return;}
  var pv = LD[pl] || [];
  var pcur = state.pos[pl+"_"+pp] || 0;
  var h = '<div class="vback" onclick="cp()"><div class="vpop" onclick="event.stopPropagation()">';
  h += '<div class="vph"><div class="vpt">Choose image for <span>'+pl+'</span></div><button class="vpc" onclick="cp()">x</button></div>';
  h += '<div class="vpg">';
  for(var i=0;i<pv.length;i++) {
    var vi = pv[i];
    h += '<div class="vptile'+(pcur===i?' sel':'')+'" onclick="pv2('+pp+','+i+')">';
    h += '<img src="'+vi.u+'" alt="'+vi.l+'" loading="lazy">';
    h += '<div class="vtlbl">'+vi.l+'</div>';
    if(pcur===i){h += '<div class="vcheck">&#10003;</div>';}
    h += '</div>';
  }
  h += '</div><p class="vhint">Click an image to select &middot; Click outside to close</p>';
  h += '</div></div>';
  el.innerHTML = h;
}

function renderPreview() {
  var ltrs = letters();
  var sz = getSize();
  var prod = getProduct();
  var el = document.getElementById("preview-sec");
  var maxW = Math.min(window.innerWidth - 80, 900);
  var canvasW = maxW;
  var canvasH = Math.round(canvasW / 2);
  var h = '<div class="prevsec fu fu3"><div class="sl">03 &middot; Preview your print</div>';
  h += '<div class="mockup-scene">';
  if(ltrs.length === 0) {
    h += '<p class="mockup-empty">Type your text above to see your preview</p>';
  } else {
    h += '<div class="canvas-wrap" style="width:'+canvasW+'px;height:'+canvasH+'px">';
    h += '<div class="canvas-border"></div>';
    h += '<div class="canvas-content">';
    for(var i=0;i<ltrs.length;i++) {
      var l = ltrs[i];
      var img = getImg(l,i);
      if(i>0){h += '<div class="canvas-div"></div>';}
      h += '<div class="canvas-tile" onclick="op('+i+')" title="Click to change">';
      if(img){h += '<img src="'+img.u+'" alt="'+l+'">';}
      else{h += '<div class="ftile" style="background:linear-gradient(135deg,'+COLORS[l]+',#080c14)">'+l+'</div>';}
      h += '</div>';
    }
    h += '</div>';
    h += '<div class="canvas-lbl">'+sz.label+' '+prod.name+' &middot; Written in Earth &middot; Click any tile to change</div>';
    h += '</div>';
  }
  h += '</div>';
  if(ltrs.length > 0) {
    h += '<div class="locbar">';
    for(var ci=0;ci<ltrs.length;ci++) {
      var cimg = getImg(ltrs[ci],ci);
      if(cimg){h += '<div class="lchip"><strong>'+ltrs[ci]+'</strong>'+cimg.l+'</div>';}
    }
    h += '</div>';
  }
  h += '</div>';
  el.innerHTML = h;
}

function renderOrder() {
  var sz = getSize();
  var prod = getProduct();
  var ltrs = letters();
  var isDigital = state.productId === "digital";
  var isPrint   = state.productId === "print";
  var isCanvas  = state.productId === "canvas";

  var h = '<div class="osec fu fu4"><div class="sl">04 &middot; Choose your format &amp; size</div>';

  // Tabs
  h += '<div class="ptabs">';
  for(var pi=0;pi<PRODUCTS.length;pi++) {
    var p = PRODUCTS[pi];
    h += '<div class="ptab'+(state.productId===p.id?' act':'')+'" onclick="sp('+pi+')">';
    h += '<div class="tname">'+p.name+'</div>';
    h += '<div class="tdesc">'+p.desc+'</div>';
    h += '</div>';
  }
  h += '</div>';

  // Panel
  if(isDigital) {
    h += '<div class="digital-panel">';
    h += '<div class="digital-price">$14.99</div>';
    h += '<div class="digital-sub">ANY SIZE &middot; INSTANT DOWNLOAD</div>';
    h += '</div>';
    h += '<div class="digital-note">High resolution PNG &middot; Instant download after purchase &middot; Print at any local shop</div>';
  } else {
    h += '<div class="spanel"><div class="sgrid">';
    for(var si=0;si<prod.sizes.length;si++) {
      var s = prod.sizes[si];
      h += '<div class="scard'+(state.sizeId===s.id?' sel':'')+'" onclick="ss('+si+')">';
      h += '<div class="slbl">'+s.label+'</div>';
      h += '<div class="ssub">('+s.sub+')</div>';
      h += '<div class="sprice">'+s.price+'</div>';
      h += '</div>';
    }
    h += '</div></div>';
    h += '<div class="loc-toggle" onclick="tl()">';
    h += '<div class="ttrack'+(state.showLocs?' on':'')+'"><div class="tthumb"></div></div>';
    h += '<div class="ttext"><span class="ttitle">Include location names on print</span>';
    h += '<span class="tdescr">'+(state.showLocs?'Location printed beneath each letter':'Clean print — letters only')+'</span></div>';
    h += '</div>';
  }

  // Button
  var btnText = "";
  var subText = "";
  if(isDigital) {
    btnText = "Get Digital Download &mdash; $14.99 &middot; Instant Delivery";
    subText = "High-res PNG &middot; Print anywhere &middot; Instant download";
  } else if(isPrint) {
    btnText = "Order "+sz.label+" Fine Art Print &mdash; "+sz.price+" &middot; Free Shipping";
    subText = "Museum-grade paper &middot; Fulfilled by Prodigi &middot; Ships in 3-5 days";
  } else {
    btnText = "Order "+sz.label+" Canvas Print &mdash; "+sz.price+" &middot; Free Shipping";
    subText = "Gallery-wrapped &middot; Fulfilled by Printful &middot; Ships in 5-7 days";
  }

  h += '<button class="ctabtn"'+(ltrs.length?'':' disabled')+' onclick="ho()">'+btnText+'</button>';
  h += '<p class="csub">'+subText+'</p>';
  h += '</div>';
  document.getElementById("order-sec").innerHTML = h;
}

function renderCopy() {
  var ltrs = letters();
  var el = document.getElementById("copy-sec");
  if(!el || ltrs.length === 0){if(el)el.innerHTML="";return;}
  var prod = getProduct();
  var sz = getSize();

  var h = '<div class="copy-summary">';
  h += '<div class="copy-summary-title">Your order summary — copy and paste into Etsy notes</div>';
  for(var i=0;i<ltrs.length;i++){
    var l=ltrs[i];
    var img=getImg(l,i);
    h += '<div class="copy-row">';
    h += '<span class="copy-ltr">'+l+'</span>';
    h += '<span class="copy-loc">'+(img?img.l:"")+'</span>';
    h += '</div>';
  }
  h += '<div class="copy-product">'+prod.name+' &middot; '+sz.label+' &middot; '+sz.price+'</div>';
  h += '</div>';
  h += '<button class="copy-btn" id="copyBtn" onclick="doCopy()">Copy my order details</button>';
  h += '<p class="copy-hint">Paste into Etsy order notes when you check out</p>';

  el.innerHTML = h;
}

function doCopy() {
  var ltrs = letters();
  var prod = getProduct();
  var sz = getSize();
  var lines = ["My Written in Earth Order","========================","Word: "+ltrs.join(""),""];
  for(var i=0;i<ltrs.length;i++){
    var l=ltrs[i];
    var img=getImg(l,i);
    lines.push(l+" - "+(img?img.l:"")+" (image "+(( (state.pos[l+"_"+i])||0)+1)+")");
  }
  lines.push("");
  lines.push("Product: "+prod.name+" "+sz.label);
  lines.push("Price: "+sz.price);
  lines.push("");
  lines.push("Customized at: written-in-earth.vercel.app");
  var text = lines.join("\n");

  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){
      var btn=document.getElementById("copyBtn");
      if(btn){btn.textContent="Copied!";btn.classList.add("copied");setTimeout(function(){btn.textContent="Copy my order details";btn.classList.remove("copied");},2000);}
    });
  } else {
    var ta=document.createElement("textarea");
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    var btn=document.getElementById("copyBtn");
    if(btn){btn.textContent="Copied!";btn.classList.add("copied");setTimeout(function(){btn.textContent="Copy my order details";btn.classList.remove("copied");},2000);}
  }
}

function renderAll() {renderPicker();renderPopup();renderPreview();renderOrder();renderCopy();}

function hi(v) {
  state.text = v.replace(/[^A-Za-z]/g,"").toUpperCase();
  document.getElementById("cc").textContent = state.text.length+"/10";
  renderAll();
}
function op(pos) {
  var ltrs = letters();
  if(pos < ltrs.length && (LD[ltrs[pos]]||[]).length > 1){state.popup=pos;renderPopup();}
}
function cp() {state.popup=null;renderPopup();}
function pv2(pos,idx) {
  var ltrs = letters();
  if(pos < ltrs.length){state.pos[ltrs[pos]+"_"+pos]=idx;}
  state.popup=null;
  renderAll();
}
function sp(i) {
  state.productId = PRODUCTS[i].id;
  state.sizeId = PRODUCTS[i].sizes[0].id;
  renderOrder();
}
function ss(i) {
  state.sizeId = getProduct().sizes[i].id;
  renderPreview();
  renderOrder();
}
function tl() {state.showLocs=!state.showLocs;renderOrder();}
function ho() {
  if(!letters().length) return;
  var t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},3000);
}
