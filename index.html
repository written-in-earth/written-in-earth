<!DOCTYPE html>

<title>Written in Earth</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Space+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#080c14;--panel:#111927;--card:#141d2b;
  --b:rgba(120,180,255,0.1);--bhi:rgba(120,180,255,0.22);
  --gold:#c9a84c;--goldl:#e8c97a;
  --text:#d4e3f5;--dim:rgba(212,227,245,0.42);--mut:rgba(212,227,245,0.2);
  --gg:0 0 28px rgba(201,168,76,0.18);--r:4px;
}
body{background:var(--ink);color:var(--text);font-family:'DM Sans',sans-serif;}
.app{min-height:100vh;background:var(--ink);background-image:radial-gradient(ellipse 100% 50% at 50% -5%,rgba(20,50,100,0.28) 0%,transparent 65%);}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;border-bottom:1px solid var(--b);}
.brand{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:.04em;}
.brand span{color:var(--text);font-weight:400;}
.hero{text-align:center;padding:60px 24px 0;position:relative;}
.hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:1px;height:50px;background:linear-gradient(to bottom,transparent,var(--gold));opacity:.35;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-bottom:22px;padding:7px 16px;border:1px solid rgba(201,168,76,.2);border-radius:2px;background:rgba(201,168,76,.04);}
.edot{width:5px;height:5px;background:var(--gold);border-radius:50%;animation:blink 2.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.htitle{font-family:'Playfair Display',serif;font-size:clamp(48px,9vw,100px);font-weight:900;line-height:.9;color:#fff;letter-spacing:-.02em;}
.htitle .g{color:var(--gold);}
.htitle .it{font-style:italic;font-weight:400;}
.hrule{width:72px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:24px auto;opacity:.45;}
.gift-section{margin:0 auto;max-width:680px;padding:24px 32px;text-align:center;border-top:1px solid rgba(201,168,76,.15);border-bottom:1px solid rgba(201,168,76,.15);}
.gift-title{font-family:'Playfair Display',serif;font-size:26px;font-style:italic;color:#fff;margin-bottom:10px;}
.gift-desc{font-size:13px;color:var(--dim);letter-spacing:.04em;margin-bottom:16px;line-height:1.8;}
.gift-occasions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.gift-occasions span{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);border-radius:20px;padding:6px 16px;font-family:'Space Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;}
.showcase{margin-top:28px;padding:0 24px 40px;}
.showcase-strip{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.stile{position:relative;width:110px;aspect-ratio:2/3;border-radius:4px;overflow:hidden;border:1px solid rgba(201,168,76,.2);flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.stile img{width:100%;height:100%;object-fit:cover;display:block;}
.stile-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,12,20,.95) 0%,rgba(8,12,20,.1) 55%,transparent 100%);pointer-events:none;}
.stile-loc{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-family:'Space Mono',monospace;font-size:6px;color:var(--gold);letter-spacing:.08em;opacity:.8;padding:0 4px;line-height:1.3;}
.sl{font-family:'Space Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.sl::after{content:'';flex:1;height:1px;background:var(--b);}
.isec{max-width:640px;margin:0 auto;padding:0 24px 40px;}
.iwrap{position:relative;}
.ninput{width:100%;background:var(--panel);border:1px solid var(--bhi);border-radius:var(--r);padding:18px 72px 18px 22px;font-family:'Playfair Display',serif;font-size:28px;font-weight:700;letter-spacing:.18em;color:#fff;outline:none;transition:border-color .2s,box-shadow .2s;text-transform:uppercase;}
.ninput::placeholder{color:var(--mut);font-weight:400;font-style:italic;font-size:20px;letter-spacing:.05em;}
.ninput:focus{border-color:rgba(201,168,76,.4);box-shadow:0 0 0 3px rgba(201,168,76,.06),var(--gg);}
.cc{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-family:'Space Mono',monospace;font-size:10px;color:var(--mut);}
.ihint{margin-top:10px;font-size:11px;color:var(--mut);text-align:center;letter-spacing:.05em;font-family:'Space Mono',monospace;}
.psec{max-width:1100px;margin:0 auto;padding:0 24px 40px;}
.lgrid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.lcard{position:relative;width:88px;aspect-ratio:2/3;border-radius:var(--r);overflow:hidden;cursor:pointer;border:1px solid var(--b);transition:transform .2s,border-color .2s,box-shadow .2s;background:var(--card);flex-shrink:0;}
.lcard:hover{transform:translateY(-6px) scale(1.04);border-color:var(--gold);box-shadow:0 16px 40px rgba(0,0,0,.5),var(--gg);z-index:2;}
.lcard img{width:100%;height:100%;object-fit:cover;display:block;}
.ftile{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:40px;font-weight:900;color:rgba(255,255,255,.08);}
.cov{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,12,20,.92) 0%,rgba(8,12,20,.08) 52%,transparent 100%);pointer-events:none;}
.clet{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.9);}
.cbadge{position:absolute;top:6px;right:6px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:2px;font-family:'Space Mono',monospace;font-size:7px;color:var(--gold);padding:2px 4px;}
.ctap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(201,168,76,.1);opacity:0;transition:opacity .15s;font-family:'Space Mono',monospace;font-size:8px;color:var(--gold);letter-spacing:.1em;pointer-events:none;}
.lcard:hover .ctap{opacity:1;}
.lcard.solo:hover .ctap{opacity:0;}
.vback{position:fixed;inset:0;background:rgba(8,12,20,.8);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;}
.vpop{background:var(--panel);border:1px solid var(--bhi);border-radius:8px;padding:28px;max-width:520px;width:100%;box-shadow:0 32px 80px rgba(0,0,0,.7);}
.vph{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.vpt{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff;}
.vpt span{color:var(--gold);font-style:italic;}
.vpc{background:none;border:1px solid var(--bhi);border-radius:var(--r);color:var(--dim);font-size:16px;cursor:pointer;padding:4px 10px;}
.vpc:hover{border-color:var(--gold);color:var(--gold);}
.vpg{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;}
.vptile{position:relative;aspect-ratio:2/3;border-radius:var(--r);overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s;}
.vptile:hover{transform:scale(1.04);}
.vptile.sel{border-color:var(--gold);box-shadow:var(--gg);}
.vptile img{width:100%;height:100%;object-fit:cover;}
.vtlbl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(8,12,20,.95) 0%,transparent 100%);padding:18px 6px 6px;font-family:'Space Mono',monospace;font-size:7px;color:var(--dim);text-align:center;line-height:1.4;}
.vcheck{position:absolute;top:6px;right:6px;background:var(--gold);color:var(--ink);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.vhint{margin-top:14px;font-family:'Space Mono',monospace;font-size:9px;color:var(--mut);text-align:center;letter-spacing:.08em;}
.prevsec{max-width:1100px;margin:0 auto;padding:0 24px 40px;}
.mockup-wrap{position:relative;width:100%;min-height:380px;background:#0a0e16;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.mockup-wall{position:absolute;inset:0;background:linear-gradient(135deg,#1a1f2e 0%,#141820 50%,#0f1318 100%);}
.mockup-wall::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.006) 0px,rgba(255,255,255,.006) 1px,transparent 1px,transparent 60px),repeating-linear-gradient(0deg,rgba(255,255,255,.006) 0px,rgba(255,255,255,.006) 1px,transparent 1px,transparent 60px);}
.canvas-mockup{position:relative;z-index:2;box-shadow:0 24px 80px rgba(0,0,0,.8),0 4px 8px rgba(0,0,0,.5);transition:all .4s ease;}
.canvas-frame{position:absolute;inset:0;border:10px solid #1e140a;z-index:3;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(201,168,76,.15),inset 2px 2px 8px rgba(0,0,0,.4);}
.canvas-inner{width:100%;height:100%;display:flex;overflow:hidden;}
.canvas-tile{flex:1;height:100%;overflow:hidden;position:relative;cursor:pointer;}
.canvas-tile img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s;}
.canvas-tile:hover img{transform:scale(1.03);}
.canvas-tile .cfb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:900;color:rgba(255,255,255,.08);}
.canvas-sep{width:1px;background:rgba(0,0,0,.4);flex-shrink:0;z-index:1;}
.canvas-sizelabel{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(4,8,16,.85);border:1px solid rgba(201,168,76,.25);border-radius:2px;padding:5px 14px;font-family:'Space Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:.12em;white-space:nowrap;z-index:4;}
.mockup-empty{font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:var(--mut);text-align:center;position:relative;z-index:2;}
.locbar{margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.lchip{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.11);border-radius:2px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:8px;color:var(--dim);letter-spacing:.05em;}
.lchip strong{color:var(--gold);margin-right:5px;font-size:9px;}
.osec{max-width:880px;margin:0 auto;padding:0 24px 60px;}
.ptabs{display:flex;background:var(--panel);border:1px solid var(--b);border-radius:var(--r) var(--r) 0 0;border-bottom:none;overflow:hidden;}
.ptab{flex:1;padding:16px 8px;text-align:center;background:rgba(201,168,76,.07);position:relative;}
.ptab::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold);}
.tname{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#fff;margin-bottom:2px;}
.tdesc{font-size:9px;color:var(--dim);letter-spacing:.04em;}
.spanel{background:var(--panel);border:1px solid var(--b);border-radius:0 0 var(--r) var(--r);padding:20px;margin-bottom:14px;}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:520px){.sgrid{grid-template-columns:1fr;}}
.scard{padding:14px 10px;border:1.5px solid var(--b);border-radius:var(--r);cursor:pointer;text-align:center;transition:border-color .18s,background .18s;}
.scard:hover{border-color:rgba(201,168,76,.3);}
.scard.sel{border-color:var(--gold);background:rgba(201,168,76,.06);box-shadow:var(--gg);}
.slbl{font-family:'Space Mono',monospace;font-size:12px;color:#fff;margin-bottom:3px;letter-spacing:.05em;}
.ssub{font-family:'Space Mono',monospace;font-size:9px;color:var(--gold);margin-bottom:5px;letter-spacing:.05em;}
.sprice{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--goldl);}
.loc-toggle{display:flex;align-items:flex-start;gap:14px;background:var(--panel);border:1px solid var(--b);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;cursor:pointer;transition:border-color .2s;}
.loc-toggle:hover{border-color:rgba(201,168,76,.3);}
.ttrack{width:40px;height:22px;border-radius:11px;background:rgba(120,180,255,.15);border:1px solid var(--b);position:relative;transition:background .2s;flex-shrink:0;margin-top:2px;}
.ttrack.on{background:var(--gold);border-color:var(--gold);}
.tthumb{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.ttrack.on .tthumb{transform:translateX(18px);}
.ttext{flex:1;}
.ttitle{display:block;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;}
.tdescr{display:block;font-family:'Space Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.05em;line-height:1.6;}
.ctabtn{width:100%;padding:18px;background:var(--gold);color:var(--ink);border:none;border-radius:var(--r);font-family:'Playfair Display',serif;font-size:16px;font-weight:700;letter-spacing:.07em;cursor:pointer;transition:background .2s,transform .15s,box-shadow .2s;}
.ctabtn:hover{background:var(--goldl);transform:translateY(-2px);box-shadow:0 10px 28px rgba(201,168,76,.28);}
.ctabtn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none;}
.csub{text-align:center;margin-top:12px;font-family:'Space Mono',monospace;font-size:9px;color:var(--mut);letter-spacing:.1em;text-transform:uppercase;}
.foot{border-top:1px solid var(--b);padding:32px 24px;text-align:center;max-width:680px;margin:0 auto;}
.fbrand{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold);font-style:italic;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--gold);color:var(--ink);padding:12px 28px;border-radius:var(--r);font-family:'Playfair Display',serif;font-size:14px;font-weight:700;z-index:200;transition:transform .32s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .5s ease both;}
.fu1{animation-delay:.06s}.fu2{animation-delay:.13s}.fu3{animation-delay:.19s}.fu4{animation-delay:.25s}
</style>

  W:[{u:CDN+"/W/w-0-PonoyRiver-Russia.png",l:"Ponoy River, Russia"},{u:CDN+"/W/w-1-LaPrimavera-Columbia.png",l:"La Primavera, Colombia"}],
  X:[{u:CDN+"/X/x-0-WolstenholmeFjord-Greenland.png",l:"Wolstenholme Fjord, Greenland"},{u:CDN+"/X/x-1-DavisStrait-Greenland.png",l:"Davis Strait, Greenland"},{u:CDN+"/X/x-2-SermersooqMunicipality-Greenland.png",l:"Sermersooq, Greenland"}],
  Y:[{u:CDN+"/Y/y-0-B%C3%ADob%C3%ADoRiver-Chile.png",l:"Biobio River, Chile"},{u:CDN+"/Y/y-1-EstuariodeVirrila-Peru.png",l:"Estuario de Virrila, Peru"},{u:CDN+"/Y/y-2-tasmanGlacier-newZealand.png",l:"Tasman Glacier, New Zealand"}],
  Z:[{u:CDN+"/Z/z-0-PrimaveradoLeste-Brazil.png",l:"Primavera do Leste, Brazil"},{u:CDN+"/Z/z-1-MohammedBoudiaf-Algeria.png",l:"Mohammed Boudiaf, Algeria"}]
};
var COLORS={A:"#1a3a5c",B:"#2d1b4e",C:"#0d3d2e",D:"#3d1a0d",E:"#1a2d3d",F:"#2d3d1a",G:"#3d2d0d",H:"#0d1a3d",I:"#3d0d2d",J:"#1a3d2d",K:"#2d0d3d",L:"#3d1a2d",M:"#0d3d1a",N:"#1a0d3d",O:"#3d2d1a",P:"#0d2d3d",Q:"#2d3d0d",R:"#3d0d1a",S:"#1a3d0d",T:"#0d1a2d",U:"#3d1a0d",V:"#2d0d1a",W:"#1a2d0d",X:"#0d3d2d",Y:"#3d0d2d",Z:"#1a0d2d"};
var SIZES=[{id:"c1",label:'12"x24"',sub:"Entry",price:"$95",pw:300,ph:150},{id:"c2",label:'16"x32"',sub:"Most Popular",price:"$149",pw:400,ph:200},{id:"c3",label:'24"x48"',sub:"Premium",price:"$219",pw:480,ph:240}];
var SHOWCASE=["E","A","R","T","H"];
var state={text:"",pos:{},sizeId:"c1",showLocs:true,popup:null,toast:false};

function letters(){return state.text.replace(/[^A-Z]/g,"").split("");}
function getImg(letter,pos){var v=LD[letter];if(!v)return null;var idx=state.pos[letter+"_"+pos]||0;return v[idx];}
function getSize(){for(var i=0;i<SIZES.length;i++){if(SIZES[i].id===state.sizeId)return SIZES[i];}return SIZES[0];}
function fb(letter,fs){return '<div class="ftile" style="background:linear-gradient(135deg,'+COLORS[letter]+',#080c14);'+(fs?'font-size:'+fs+'px':'')+'">'+letter+'</div>';}

function render(){
  var ltrs=letters();
  var sz=getSize();
  var h='';

  // Topbar
  h+='<div class="topbar"><div class="brand">Written <span>in</span> Earth</div></div>';

  // Hero
  h+='<header class="hero fu">';
  h+='<div class="eyebrow"><span class="edot"></span>The Earth wrote this. We printed it.</div>';
  h+='<h1 class="htitle"><span class="g">Written</span><br><span class="it">in Earth</span></h1>';
  h+='<div class="hrule"></div>';
  h+='<div class="gift-section">';
  h+='<div class="gift-title">The gift they will never forget</div>';
  h+='<div class="gift-desc">A personalized piece of Earth, printed and delivered — perfect for anyone who means the world to you.</div>';
  h+='<div class="gift-occasions"><span>Birthdays</span><span>Anniversaries</span><span>Mothers Day</span><span>Weddings</span><span>Housewarmings</span></div>';
  h+='</div>';

  // Showcase
  h+='<div class="showcase"><div class="showcase-strip">';
  for(var si=0;si<SHOWCASE.length;si++){
    var sl=SHOWCASE[si];
    var simg=LD[sl]?LD[sl][0]:null;
    h+='<div class="stile">';
    h+=simg?'<img src="'+simg.u+'" alt="'+sl+'" loading="lazy">':fb(sl);
    h+='<div class="stile-ov"></div>';
    h+='<div class="stile-loc">'+(simg?simg.l:'')+'</div>';
    h+='</div>';
  }
  h+='</div></div></header>';

  // Input
  h+='<div class="isec fu fu1">';
  h+='<div class="sl">01 &middot; Enter your text</div>';
  h+='<div class="iwrap">';
  h+='<input class="ninput" id="ti" type="text" placeholder="A name, word, or company..." value="'+state.text+'" maxlength="10" oninput="hi(this.value)">';
  h+='<span class="cc">'+state.text.length+'/10</span>';
  h+='</div>';
  h+='<p class="ihint">Letters A-Z &middot; Up to 10 characters &middot; Click any tile to choose your image</p>';
  h+='</div>';

  // Letter picker — ALL letters including duplicates
  if(ltrs.length>0){
    h+='<div class="psec fu fu2">';
    h+='<div class="sl">02 &middot; Choose your satellite images</div>';
    h+='<div class="lgrid">';
    for(var li=0;li<ltrs.length;li++){
      var ll=ltrs[li];
      var lv=LD[ll]||[];
      var lidx=state.pos[ll+"_"+li]||0;
      var limg=lv[lidx];
      var multi=lv.length>1;
      h+='<div class="lcard'+(multi?'':' solo')+'" onclick="op('+li+')">';
      h+=limg?'<img src="'+limg.u+'" alt="'+ll+'" loading="lazy">':fb(ll);
      h+='<div class="cov"></div>';
      h+='<div class="clet">'+ll+'</div>';
      if(multi){h+='<div class="cbadge">'+(lidx+1)+'/'+lv.length+'</div><div class="ctap">PICK</div>';}
      h+='</div>';
    }
    h+='</div></div>';
  }

  // Popup
  if(state.popup!==null){
    var pp=state.popup;
    var pl=ltrs[pp];
    var pv=LD[pl]||[];
    var pcur=state.pos[pl+"_"+pp]||0;
    h+='<div class="vback" onclick="cp()">';
    h+='<div class="vpop" onclick="event.stopPropagation()">';
    h+='<div class="vph"><div class="vpt">Choose image for <span>'+pl+'</span></div><button class="vpc" onclick="cp()">x</button></div>';
    h+='<div class="vpg">';
    for(var vi=0;vi<pv.length;vi++){
      var vi2=pv[vi];
      h+='<div class="vptile'+(pcur===vi?' sel':'')+'" onclick="pv2('+pp+','+vi+')">';
      h+='<img src="'+vi2.u+'" alt="'+vi2.l+'" loading="lazy">';
      h+='<div class="vtlbl">'+vi2.l+'</div>';
      if(pcur===vi){h+='<div class="vcheck">&#10003;</div>';}
      h+='</div>';
    }
    h+='</div>';
    h+='<p class="vhint">Click an image to select &middot; Click outside to close</p>';
    h+='</div></div>';
  }

  // Canvas mockup preview
  h+='<div class="prevsec fu fu3">';
  h+='<div class="sl">03 &middot; Preview your print</div>';
  h+='<div class="mockup-wrap">';
  h+='<div class="mockup-wall"></div>';
  if(ltrs.length===0){
    h+='<p class="mockup-empty">Type your text above to see your canvas preview</p>';
  } else {
    h+='<div class="canvas-mockup" style="width:'+sz.pw+'px;height:'+sz.ph+'px">';
    h+='<div class="canvas-frame"></div>';
    h+='<div class="canvas-inner">';
    for(var ci=0;ci<ltrs.length;ci++){
      var cl=ltrs[ci];
      var cimg=getImg(cl,ci);
      if(ci>0){h+='<div class="canvas-sep"></div>';}
      h+='<div class="canvas-tile" onclick="op('+ci+')" title="Click to change">';
      if(cimg){h+='<img src="'+cimg.u+'" alt="'+cl+'">';}
      else{h+='<div class="cfb" style="background:linear-gradient(135deg,'+COLORS[cl]+',#080c14)">'+cl+'</div>';}
      h+='</div>';
    }
    h+='</div>';
    h+='<div class="canvas-sizelabel">'+sz.label+' Canvas &middot; Written in Earth</div>';
    h+='</div>';
  }
  h+='</div>';

  // Location chips
  if(ltrs.length>0){
    h+='<div class="locbar">';
    for(var lci=0;lci<ltrs.length;lci++){
      var lcl=ltrs[lci];
      var lcimg=getImg(lcl,lci);
      if(lcimg){h+='<div class="lchip"><strong>'+lcl+'</strong>'+lcimg.l+'</div>';}
    }
    h+='</div>';
  }
  h+='</div>';

  // Order
  h+='<div class="osec fu fu4">';
  h+='<div class="sl">04 &middot; Choose your size</div>';
  h+='<div class="ptabs"><div class="ptab"><div class="tname">Canvas Print</div><div class="tdesc">Gallery-wrapped &middot; Ready to hang</div></div></div>';
  h+='<div class="spanel"><div class="sgrid">';
  for(var oi=0;oi<SIZES.length;oi++){
    var os=SIZES[oi];
    h+='<div class="scard'+(state.sizeId===os.id?' sel':'')+'" onclick="ss('+oi+')">';
    h+='<div class="slbl">'+os.label+' '+os.price+'</div>';
    h+='<div class="ssub">('+os.sub+')</div>';
    h+='</div>';
  }
  h+='</div></div>';
  h+='<div class="loc-toggle" onclick="tl()">';
  h+='<div class="ttrack'+(state.showLocs?' on':'')+'"><div class="tthumb"></div></div>';
  h+='<div class="ttext"><span class="ttitle">Include location names on print</span>';
  h+='<span class="tdescr">'+(state.showLocs?'Location printed beneath each letter':'Clean print — letters only')+'</span></div>';
  h+='</div>';
  h+='<button class="ctabtn"'+(ltrs.length?'':' disabled')+' onclick="ho()">Order '+sz.label+' Canvas &mdash; '+sz.price+' &middot; Free Shipping Included</button>';
  h+='<p class="csub">Archival quality &middot; Fulfilled by Printful &middot; Ships in 5-7 days</p>';
  h+='</div>';

  h+='<footer class="foot"><div class="fbrand">Written in Earth</div></footer>';
  h+='<div class="toast'+(state.toast?' show':'')+'">&#10003; Order received &mdash; check your email</div>';

  document.getElementById("app").innerHTML=h;
}

function hi(v){state.text=v.replace(/[^A-Za-z]/g,"").toUpperCase();render();setTimeout(function(){var i=document.getElementById("ti");if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}},0);}
function op(pos){var ltrs=letters();if(pos<ltrs.length&&(LD[ltrs[pos]]||[]).length>1){state.popup=pos;render();}}
function cp(){state.popup=null;render();}
function pv2(pos,idx){var ltrs=letters();if(pos<ltrs.length){state.pos[ltrs[pos]+"_"+pos]=idx;}state.popup=null;render();}
function ss(i){state.sizeId=SIZES[i].id;render();}
function tl(){state.showLocs=!state.showLocs;render();}
function ho(){if(!letters().length)return;state.toast=true;render();setTimeout(function(){state.toast=false;render();},3000);}

render();
</script>
</body>
</html>
